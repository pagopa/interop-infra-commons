name: Reusable Terraform Pre-Commit Checks

on:
  workflow_call:
    inputs:
      discovery_mode:
        required: false
        type: string
        default: ""
        # expected values: "modules", "env-roots", "auto", "" (default: "")
      search_path:
        required: false
        type: string
        default: .
      tfversion:
        required: false
        type: string
        default: "" # if empty, the workflow will attempt to compute the Terraform version for each root using the existing logic in compute-tf-version.sh
      tflint_version:
        required: false
        type: string
        default: v0.61.0

env:
  TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache
  TFLINT_PLUGIN_DIR: ${{ github.workspace }}/.tflint.d/plugins
  PRE_COMMIT_CONFIG_TMPL: .pre-commit-config.yaml.tpl
  INFRA_COMMONS_REPO: pagopa/interop-infra-commons
  INFRA_COMMONS_REF: feature/pin-9552-tf-check-precommit # temporary branch for testing, should be updated to a stable reference (e.g. main or a release tag)
  INFRA_COMMONS_PATH: .terraform-precommit-workflows # destination path for the checked out infra-commons repository within the workflow
  INFRA_COMMONS_SCRIPTS_RELATIVE_PATH: scripts/terraform

permissions:
  contents: read

jobs:
  discover:
    name: Discover Terraform roots
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout infra-commons workflow repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.INFRA_COMMONS_REPO }}
          ref: ${{ env.INFRA_COMMONS_REF }}
          path: ${{ env.INFRA_COMMONS_PATH }}
          sparse-checkout: |
            ${{ env.INFRA_COMMONS_SCRIPTS_RELATIVE_PATH }}

      - name: Discover Terraform roots
        id: discover
        env:
          INFRA_COMMONS_PATH: ${{ env.INFRA_COMMONS_PATH }}
          INFRA_COMMONS_SCRIPTS_RELATIVE_PATH: ${{ env.INFRA_COMMONS_SCRIPTS_RELATIVE_PATH }}
          DISCOVERY_MODE: ${{ inputs.discovery_mode }}
          SEARCH_PATH: ${{ inputs.search_path }}
        run: |
          set -euo pipefail

          if [ -z "$DISCOVERY_MODE" ]; then
            echo "No discovery mode specified, defaulting to single root: $SEARCH_PATH"
            matrix="$(jq -cn --arg path "$SEARCH_PATH" --arg name "$(basename "$SEARCH_PATH")" '{include:[{path: $path, name: $name}]}')"
            echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          discovery_script="$INFRA_COMMONS_PATH/$INFRA_COMMONS_SCRIPTS_RELATIVE_PATH/discover-terraform-roots.sh"
          echo "Discovering Terraform roots using script: $discovery_script"

          if [ ! -x "$discovery_script" ]; then
            echo "::error::Missing executable script: $discovery_script"
            exit 1
          fi

          matrix="$(
            "$discovery_script" \
              "$DISCOVERY_MODE" \
              "$SEARCH_PATH"
          )"

          matrix="$(echo "$matrix" | jq -c '.')"

          echo "$matrix"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  checks:
    name: "[${{ matrix.name }}] Terraform checks"
    needs: discover
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      max-parallel: 10
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout central workflow repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.INFRA_COMMONS_REPO }}
          ref: ${{ env.INFRA_COMMONS_REF }}
          path: ${{ env.INFRA_COMMONS_PATH }}
          sparse-checkout: |
            ${{ env.INFRA_COMMONS_SCRIPTS_RELATIVE_PATH }}
            .tflint.hcl
            .pre-commit-config.yaml.tpl

      - name: Compute Terraform version
        id: tf-version
        env:
          INFRA_COMMONS_PATH: ${{ env.INFRA_COMMONS_PATH }}
          INFRA_COMMONS_SCRIPTS_RELATIVE_PATH: ${{ env.INFRA_COMMONS_SCRIPTS_RELATIVE_PATH }}
          PROVIDED_TF_VERSION: ${{ inputs.tfversion }}
          ROOT: ${{ matrix.path }}
        run: |
          set -euo pipefail

          # If tfversion input is provided, use it directly without running the discovery script.
          # This allows the caller workflow to override the Terraform version discovery logic when needed 
          # (e.g. if the .terraform-version file is missing or if a specific version needs to be enforced for the checks).
          if [ -n "$PROVIDED_TF_VERSION" ]; then
            echo "Using provided Terraform version: $PROVIDED_TF_VERSION"
            echo "tf_version=$PROVIDED_TF_VERSION" >> "$GITHUB_OUTPUT"
            echo "tf_version_hash=$(echo "$PROVIDED_TF_VERSION" | sha256sum | awk '{print $1}')" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # If tfversion input is empty, run the discovery script to compute the Terraform version for the current root.
          script="$INFRA_COMMONS_PATH/$INFRA_COMMONS_SCRIPTS_RELATIVE_PATH/compute-tf-version.sh"
          root="$ROOT"

          if [ ! -x "$script" ]; then
            echo "::error::Missing executable script: $script"
            exit 1
          fi

          tf_version="$("$script" "$GITHUB_WORKSPACE/$root")"
          tf_version="$(echo "$tf_version" | xargs)"

          echo "Terraform version for $root: $tf_version"
          echo "tf_version=$tf_version" >> "$GITHUB_OUTPUT"
          echo "tf_version_hash=$(echo "$tf_version" | sha256sum | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Ensure cache dirs
        run: |
          mkdir -p "${TF_PLUGIN_CACHE_DIR}"
          mkdir -p "${TFLINT_PLUGIN_DIR}"

      - name: Cache Terraform plugins
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.TF_PLUGIN_CACHE_DIR }}
          key: tf-${{ runner.os }}-${{ steps.tf-version.outputs.tf_version_hash }}

      - name: Setup Terraform ${{ steps.tf-version.outputs.tf_version }}
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ steps.tf-version.outputs.tf_version }}

      - name: Show Terraform version
        run: terraform version

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@6770de8d186019a148cc2b144e8bfa627f7d4aa8
        with:
          tflint_version: ${{ inputs.tflint_version }}

      - name: Cache TFLint plugins
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ env.TFLINT_PLUGIN_DIR }}
          key: tflint-${{ inputs.tflint_version }}-${{ hashFiles('**/.tflint.hcl') }}
          restore-keys: |
            tflint-${{ inputs.tflint_version }}-
            tflint-

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Run pre-commit on Terraform root
        env:
          ROOT: ${{ matrix.path }}
          PRE_COMMIT_CONFIG_TMPL: ${{ env.PRE_COMMIT_CONFIG_TMPL }}
          INFRA_COMMONS_PATH: ${{ env.INFRA_COMMONS_PATH }}
        run: |
          set -euo pipefail

          root="$ROOT"
          infra_commons_abs="$GITHUB_WORKSPACE/$INFRA_COMMONS_PATH"

          tmp_workspace="$RUNNER_TEMP/precommit-workspace"
          tmp_config="$RUNNER_TEMP/pre-commit-terraform.yaml"

          rm -rf "$tmp_workspace"
          mkdir -p "$tmp_workspace"

          unset TF_PLUGIN_CACHE_DIR

          # Copy the caller repository into a temporary workspace.
          # Terraform init can modify .terraform.lock.hcl here without touching the real GitHub checkout.
          rsync -a \
            --exclude='.git' \
            --exclude='.terraform.d' \
            --exclude='.tflint.d' \
            --exclude='**/.terraform' \
            "$GITHUB_WORKSPACE/" "$tmp_workspace/"

          cd "$tmp_workspace"

          if [ -z "$(find "$root" -type f \( -name '*.tf' -o -name '*.tfvars' \) -print -quit)" ]; then
            echo "No Terraform files found in $root, skipping."
            exit 0
          fi

          config_tmpl="$GITHUB_WORKSPACE/$INFRA_COMMONS_PATH/$PRE_COMMIT_CONFIG_TMPL"
          if [ ! -f "$config_tmpl" ]; then
            echo "::error::pre-commit config template not found: $config_tmpl"
            exit 1
          fi

          tflint_config="$infra_commons_abs/.tflint.hcl"
          if [ ! -f "$tflint_config" ]; then
            echo "::error::.tflint.hcl not found in checked out infra-commons path: $tflint_config"
            exit 1
          fi

          lockfile_arg=""

          # In some cases, the .terraform.lock.hcl file might be located in a parent directory of the Terraform root 
          # (e.g. if the root is a subdirectory of a larger Terraform configuration). 
          # In those cases, we want to pass the -lockfile=readonly argument to Terraform init to ensure that
          # the lockfile is not modified during the checks. 
          # The following logic checks for the presence of a .terraform.lock.hcl file in the Terraform root or
          # any of its parent directories and sets the lockfile_arg variable accordingly.
          #if find "$root" -type f -name ".terraform.lock.hcl" -print -quit | grep -q .; then
          #  lockfile_arg="- --tf-init-args=-lockfile=readonly"
          #fi

          escaped_root="$(printf '%s\n' "$root" | sed 's/[.[\*^$()+?{}|]/\\&/g')"
          escaped_git_working_dir="$(printf '%s\n' "$infra_commons_abs" | sed 's/[.[\*^$()+?{}|]/\\&/g')"

          # Do not use -lockfile=readonly.
          # Lockfile updates, if any, happen only in the temporary workspace.
          sed "s#__TERRAFORM_ROOT__#$escaped_root#g; \
               s#__GIT_WORKING_DIR__#$escaped_git_working_dir#g; \
               s#__TERRAFORM_LOCKFILE_ARG__##g" \
            "$config_tmpl" > "$tmp_config"

          # Avoid shared Terraform plugin cache while running Terraform in the temporary workspace.
          #unset TF_PLUGIN_CACHE_DIR

          # Create a temporary Git history so we can distinguish lockfile-only changes
          # from real formatting/configuration changes.
          git init --quiet
          git config user.email "ci@example.com"
          git config user.name "CI"
          git add .
          git commit -m "baseline" --quiet

          set +e
          pre-commit run \
            --config "$tmp_config" \
            --show-diff-on-failure \
            -a
          precommit_exit_code=$?
          set -e

          changed_files="$(git status --porcelain | awk '{print $2}')"

          if [ -n "$changed_files" ]; then
            echo "Files changed during pre-commit in temporary workspace:"
            echo "$changed_files"
          fi

          non_lockfile_changes="$(
            echo "$changed_files" | grep -vE '(^|/)\.terraform\.lock\.hcl$' || true
          )"

          if [ "$precommit_exit_code" -ne 0 ] && [ -n "$changed_files" ] && [ -z "$non_lockfile_changes" ]; then
            echo "Only .terraform.lock.hcl files were modified in the temporary workspace; ignoring these changes."
            exit 0
          fi

          exit "$precommit_exit_code"

  gate:
    name: Terraform CI Gate
    if: always()
    needs: checks
    runs-on: ubuntu-24.04

    steps:
      - name: Check matrix jobs status
        env:
          CHECKS_RESULT: ${{ needs.checks.result }}
        run: |
          result="$CHECKS_RESULT"
          if [[ "$result" != "success" ]]; then
            echo "::error title=Terraform CI Gate::One or more Terraform checks failed: $result"
            exit 1
          fi

          echo "Terraform CI Gate: all Terraform checks passed."